name: ci
on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        run: |
          sudo apt-get update && sudo apt-get install -y clang-format
          find core tests app platform tui gui daemon -name '*.hpp' -o -name '*.cpp' | xargs clang-format --dry-run --Werror
      - name: Toolkit purity guard (no Qt in core/app/platform/daemon)
        # The Phase 3 seam test as a hard gate: the shared layers must stay
        # toolkit-agnostic. `!` inverts grep — finding any match fails the job.
        run: |
          ! grep -rn --include='*.hpp' --include='*.cpp' -E '#include\s*[<"]Q[A-Za-z]' core app platform daemon
      - name: sdbus purity guard (sdbus-c++ only in daemon/ + the channel leaf)
        # The Phase 4 quarantine: sdbus types must never leak into the shared
        # layers. Allowed: daemon/src/* and the one client leaf file.
        run: |
          ! grep -rn --include='*.hpp' --include='*.cpp' -E '#include\s*[<"]sdbus' \
              core app gui tui tests platform \
              | grep -v '^platform/linux/src/dbus_privileged_channel.cpp:'
      - name: Build and unit-test (Docker)
        run: docker compose -f test/docker-compose.yml run --rm unit
      - name: Static analysis (clang-tidy)
        # Reuses the image built above (toolchain + deps + compile_commands.json baked in).
        # Hard gate: any clang-tidy diagnostic in core/src fails the build.
        run: docker compose -f test/docker-compose.yml run --rm unit bash -c "clang-tidy -p build/linux-debug --warnings-as-errors='*' core/src/*.cpp app/src/*.cpp platform/linux/src/*.cpp gui/src/*.cpp daemon/src/*.cpp"
