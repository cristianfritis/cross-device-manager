name: ci
on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        run: |
          # Pinned to 18: unversioned `clang-format` floats with the runner image, and
          # versions disagree on trailing-comment alignment and `T x{}` spacing — a
          # runner bump would fail this gate with no source change. 18 matches the
          # container toolchain (Dockerfile, ubuntu:24.04).
          sudo apt-get update && sudo apt-get install -y clang-format-18
          find core tests app platform tui gui daemon cli -name '*.hpp' -o -name '*.cpp' | xargs clang-format-18 --dry-run --Werror
      - name: Toolkit purity guard (no Qt in core/app/platform/daemon/cli)
        # The Phase 3 seam test as a hard gate: the shared layers and the
        # UI-free recovery CLI must stay toolkit-agnostic. `!` inverts grep —
        # finding any match fails the job.
        run: |
          ! grep -rn --include='*.hpp' --include='*.cpp' -E '#include\s*[<"]Q[A-Za-z]' core app platform daemon cli
      - name: sdbus purity guard (sdbus-c++ only in daemon/ + the channel leaf)
        # The Phase 4 quarantine: sdbus types must never leak into the shared
        # layers. Allowed: daemon/src/*, the one client leaf file, and the
        # Phase 6 frontend-direct fwupd client (fwupd-named, DEVMGR_WITH_SDBUS
        # gated) — the parse layer's public API exposes sdbus::Variant by design.
        # The fwupd exemption is anchored to platform/ and tests/ ONLY: a
        # fwupd-named file under core/app/gui/tui must still trip the guard.
        run: |
          ! grep -rn --include='*.hpp' --include='*.cpp' -E '#include\s*[<"]sdbus' \
              core app gui tui tests platform cli \
              | grep -vE '^(platform/linux/src/dbus_privileged_channel\.cpp|(platform|tests)/.*fwupd.*\.(cpp|hpp)):'
      - name: Build and unit-test (Docker)
        run: docker compose -f test/docker-compose.yml run --rm unit
      - name: Static analysis (clang-tidy)
        # Reuses the image built above (toolchain + deps + compile_commands.json baked in).
        # Hard gate: any clang-tidy diagnostic in core/src fails the build.
        run: docker compose -f test/docker-compose.yml run --rm unit bash -c "clang-tidy -p build/linux-debug --warnings-as-errors='*' core/src/*.cpp app/src/*.cpp platform/linux/src/*.cpp gui/src/*.cpp daemon/src/*.cpp cli/src/*.cpp"
