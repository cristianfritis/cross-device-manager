# Release pipeline (release-pipeline + release-supply-chain specs): tag v* →
# container build with the tag==version guard, full ctest (fail = no artifacts),
# cpack DEB+TGZ (ubuntu) and RPM (fedora), SBOM, SHA256SUMS over the whole set,
# minisign signatures + provenance attestation, draft prerelease with the full
# asset set (deb, rpm, tarball, SHA256SUMS, SBOM, .minisig) and a template-filled
# body. Publishing stays a manual owner action (paired with the repo-public flip).
name: release
on:
  push:
    tags: ['v*']

permissions:
  contents: write
  # Build-provenance attestation (release-supply-chain spec, task 5.2) needs to
  # mint an OIDC token and write the attestation to the repo's attestation store.
  id-token: write
  attestations: write

jobs:
  # RPM gate (packaging-rpm spec): build the full stack in a Fedora container,
  # cut the rpm with `cpack -G RPM`, dnf-install it, and `rpm -V`-verify — the
  # container analogue of the deb's VM install-smoke. Independent of the deb
  # release job; the owner confirms every gate job green before publishing the
  # draft. Asset wiring into the release (rpm in SHA256SUMS + upload) lands with 5.4.
  rpm-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Fedora packaging image
        run: docker compose -f test/docker-compose.yml build pkg-rpm
      - name: Build + install + rpm -V verify the RPM (Fedora container)
        run: docker compose -f test/docker-compose.yml run --rm pkg-rpm

  # Reproducibility gate (release-supply-chain spec, task 5.3): build the tagged
  # source twice in the packaging container with a pinned SOURCE_DATE_EPOCH and
  # diff the four shipped binaries. Any UNEXPLAINED difference fails the job and
  # blocks the release; known, explained deviations are recorded in
  # docs/REPRODUCIBILITY.md. Independent of the deb/rpm jobs; the owner confirms
  # every gate job green before publishing the draft.
  reproducibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build packaging container (ubuntu:22.04 base)
        run: docker compose -f test/docker-compose.yml build pkg
      - name: Double-build + binary checksum diff
        run: |
          # Pin the embedded build timestamp to the tagged commit (HEAD after
          # checkout) so __DATE__/__TIME__ match across both builds.
          SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)
          docker compose -f test/docker-compose.yml run --rm \
            -e SOURCE_DATE_EPOCH="$SOURCE_DATE_EPOCH" \
            pkg bash test/container/reproducibility-check.sh

  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build packaging container (ubuntu:22.04 base)
        # Oldest supported series: artifacts built here install on 22.04 AND
        # 24.04 (glibc floor + t64 Provides), per the packaging-deb spec.
        run: docker compose -f test/docker-compose.yml build pkg

      - name: Build, guard tag==version, test, package (container)
        run: |
          mkdir -p dist
          docker compose -f test/docker-compose.yml run --rm \
            -e TAG="$GITHUB_REF_NAME" -v "$PWD/dist:/dist" pkg bash -c '
            set -e
            cmake --preset linux-packaged
            cmake --build build/linux-packaged -j"$(nproc)"
            ver=$(./build/linux-packaged/daemon/devmgrd --version | cut -d" " -f2)
            if [ "v$ver" != "$TAG" ]; then
              echo "tag $TAG does not match built version $ver" >&2
              exit 1
            fi
            ctest --test-dir build/linux-packaged --output-on-failure
            cpack --config build/linux-packaged/CPackConfig.cmake -B /dist
            rm -rf /dist/_CPack_Packages
          '

      # RPM asset (packaging-rpm spec, task 5.4): the shipped .rpm is cut in the
      # SAME Fedora container the rpm-verify gate uses, so its Requires/scriptlets
      # match what was verified there. Built into dist/ to join the asset set.
      # SHA256SUMS (below, after the SBOM) covers it.
      - name: Build Fedora packaging image
        run: docker compose -f test/docker-compose.yml build pkg-rpm

      - name: Build the RPM (Fedora container) into dist
        run: |
          docker compose -f test/docker-compose.yml run --rm \
            -e TAG="$GITHUB_REF_NAME" -v "$PWD/dist:/dist" pkg-rpm bash -c '
            set -e
            cmake --preset linux-packaged
            cmake --build build/linux-packaged -j"$(nproc)"
            ver=$(./build/linux-packaged/daemon/devmgrd --version | cut -d" " -f2)
            if [ "v$ver" != "$TAG" ]; then
              echo "tag $TAG does not match built version $ver" >&2
              exit 1
            fi
            cpack --config build/linux-packaged/CPackConfig.cmake -G RPM -B /dist
            rm -rf /dist/_CPack_Packages
          '

      # SBOM (release-supply-chain spec, task 5.1): syft catalogs the shipped
      # artifacts, then merge-sbom.py folds in the vendored/static deps syft
      # cannot see once they are linked away — sdbus-c++, ftxui, spdlog, fmt,
      # nlohmann-json, tl-expected, and the in-tree sha256. Source of truth for
      # those rows: packaging/sbom/overlay.spdx.json + docs/DEPENDENCY-AUDIT.md.
      # --require fails the release if any vendored dep is missing from the SBOM.
      # Folding SBOM.spdx.json into SHA256SUMS and uploading it are task 5.4.
      - name: Install syft
        env:
          # Pinned for reproducibility; owner bumps deliberately. The release job
          # only runs on an owner-pushed tag, so a bad pin surfaces at release.
          SYFT_VERSION: v1.18.1
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin "$SYFT_VERSION"
          syft version

      - name: Generate SBOM (syft SPDX + vendored overlay)
        run: |
          syft scan dir:dist -o spdx-json=sbom.syft.spdx.json
          python3 packaging/sbom/merge-sbom.py \
            sbom.syft.spdx.json packaging/sbom/overlay.spdx.json dist/SBOM.spdx.json \
            --require sdbus-c++,ftxui,spdlog,fmt,nlohmann-json,tl-expected,devmgr-sha256
          rm -f sbom.syft.spdx.json

      # Checksums over every shipped artifact (release-supply-chain spec, task
      # 5.4): deb, rpm, tarball, and the SBOM. Generated here — after the rpm and
      # SBOM exist — so SHA256SUMS covers the full set, then it is itself signed
      # below. The .minisig signatures are verified with minisign, not listed here.
      - name: Checksums over all release artifacts
        run: cd dist && sha256sum *.deb *.rpm *.tar.gz SBOM.spdx.json > SHA256SUMS

      - name: Verify checksums
        run: cd dist && sha256sum -c SHA256SUMS

      # minisign detached signatures (release-supply-chain spec, task 5.2): sign
      # every asset a tester downloads. The self-verify against the COMMITTED
      # public key (packaging/signing/devmgr.pub) fails the release on a wrong
      # key or corrupt signature, so unsigned/mis-signed artifacts never ship.
      # Owner setup (generate key, set secrets, commit the real pubkey) is in
      # packaging/signing/README.md — the placeholder-key guard below refuses to
      # sign until that is done. Uploading the .minisig files is task 5.4.
      - name: Sign artifacts (minisign)
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        run: |
          set -euo pipefail
          if grep -q REPLACE_ME packaging/signing/devmgr.pub; then
            echo "::error::packaging/signing/devmgr.pub is still the placeholder — see packaging/signing/README.md (owner one-time setup)." >&2
            exit 1
          fi
          if [ -z "${MINISIGN_SECRET_KEY:-}" ]; then
            echo "::error::MINISIGN_SECRET_KEY secret is not set — see packaging/signing/README.md." >&2
            exit 1
          fi
          sudo apt-get update && sudo apt-get install -y minisign
          umask 077
          printf '%s\n' "$MINISIGN_SECRET_KEY" > minisign.key
          trap 'rm -f minisign.key' EXIT
          for f in dist/*; do
            case "$f" in *.minisig) continue ;; esac
            printf '%s\n' "${MINISIGN_PASSWORD:-}" \
              | minisign -S -s minisign.key -m "$f" \
                  -c "devmgr $GITHUB_REF_NAME" \
                  -t "devmgr $GITHUB_REF_NAME release artifact, signed by the release workflow"
          done
          # Self-verify every signature against the committed public key.
          for sig in dist/*.minisig; do
            minisign -Vm "${sig%.minisig}" -p packaging/signing/devmgr.pub
          done

      # Build-provenance attestation (task 5.2): binds each asset to this workflow
      # run + source commit, verifiable with `gh attestation verify`, independent
      # of the minisign key. Covers the artifacts and their .minisig signatures.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/*'

      - name: Draft prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ver=${GITHUB_REF_NAME#v}
          sed "s/@VERSION@/$ver/g; s/@TAG@/$GITHUB_REF_NAME/g" \
            docs/RELEASE-NOTES-TEMPLATE.md > /tmp/notes.md
          gh release create "$GITHUB_REF_NAME" \
            dist/*.deb dist/*.rpm dist/*.tar.gz \
            dist/SHA256SUMS dist/SBOM.spdx.json dist/*.minisig \
            --draft --prerelease --title "devmgr $ver" --notes-file /tmp/notes.md
